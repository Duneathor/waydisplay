name: WayDisplay CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: waydisplay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev liburing-dev
      - name: Configure
        run: cmake --preset tests-core
      - name: Build and test
        run: cmake --build --preset tests-core --parallel 2

  warnings:
    name: Strict warnings
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev liburing-dev
      - name: Configure
        run: cmake --preset tests-warnings
      - name: Build
        run: cmake --build --preset tests-warnings --parallel 2
      - name: Test
        run: ctest --preset tests-warnings

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan and UBSan
            preset: tests-asan-ubsan
            environment: ASAN_OPTIONS=detect_leaks=1:strict_string_checks=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
          - name: ThreadSanitizer
            preset: tests-tsan
            environment: TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev liburing-dev
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel 2
      - name: Test
        run: ${{ matrix.environment }} ctest --preset ${{ matrix.preset }}

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install coverage dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev liburing-dev gcovr
      - name: Configure
        run: cmake --preset tests-coverage
      - name: Build and test
        run: cmake --build --preset tests-coverage --parallel 2 && ctest --preset tests-coverage
      - name: Report coverage
        run: gcovr --root . --filter 'src/' --exclude 'tests/' --print-summary --xml-pretty -o build-tests-coverage/coverage.xml

  codecs:
    name: Codec and resize round-trip tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install codec dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          cmake gcc g++ make pkg-config libzstd-dev liburing-dev
          libavcodec-dev libavutil-dev libswscale-dev
      - name: Configure strict codec tests
        run: cmake --preset tests-codecs
      - name: Build and test
        run: cmake --build --preset tests-codecs --parallel 2

  runtime-backends:
    name: Required SDL, wlroots 0.19, codec, and audio build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          cmake gcc g++ make pkg-config git meson ninja-build
          libzstd-dev liburing-dev libwayland-dev wayland-protocols libxkbcommon-dev
          libpixman-1-dev libdrm-dev libgbm-dev libinput-dev libseat-dev libudev-dev
          libdisplay-info-dev libliftoff-dev libavcodec-dev libavutil-dev libswscale-dev
          libopus-dev libpipewire-0.3-dev
      - name: Build SDL3
        run: |
          git clone --depth 1 --branch release-3.2.0 https://github.com/libsdl-org/SDL.git /tmp/SDL
          cmake -S /tmp/SDL -B /tmp/SDL/build -DCMAKE_BUILD_TYPE=Release -DSDL_TEST_LIBRARY=OFF
          cmake --build /tmp/SDL/build --parallel 2
          sudo cmake --install /tmp/SDL/build
          pkg-config --modversion sdl3
      - name: Build pinned wlroots 0.19
        run: |
          git clone --depth 1 --branch 0.19.0 https://gitlab.freedesktop.org/wlroots/wlroots.git /tmp/wlroots
          meson setup /tmp/wlroots/build /tmp/wlroots \
            --buildtype=release --prefix=/usr/local \
            -Dxwayland=disabled -Dexamples=false
          meson compile -C /tmp/wlroots/build
          sudo meson install -C /tmp/wlroots/build
          pkg-config --modversion wlroots-0.19
      - name: Configure full runtime build
        run: >-
          cmake --preset tests-full
          -DWAYDISPLAY_ENABLE_XWAYLAND=OFF
          -DWAYDISPLAY_WARNINGS_AS_ERRORS=ON
      - name: Build and test
        run: cmake --build --preset tests-full --parallel 2
