name: WayDisplay CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: waydisplay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev
      - name: Configure
        run: cmake --preset tests-core
      - name: Build and test
        run: cmake --build --preset tests-core --parallel 2

  warnings:
    name: Strict warnings
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev
      - name: Configure
        run: cmake --preset tests-warnings
      - name: Build
        run: cmake --build --preset tests-warnings --parallel 2
      - name: Test
        run: ctest --preset tests-warnings

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan and UBSan
            preset: tests-asan-ubsan
            environment: ASAN_OPTIONS=detect_leaks=1:strict_string_checks=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
          - name: ThreadSanitizer
            preset: tests-tsan
            environment: TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++ make pkg-config libzstd-dev
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel 2
      - name: Test
        run: ${{ matrix.environment }} ctest --preset ${{ matrix.preset }}

  optional-backends:
    name: Optional SDL, wlroots, codec, and audio backends
    runs-on: ubuntu-24.04
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          cmake gcc g++ make pkg-config
          libzstd-dev liburing-dev libsdl2-dev libwayland-dev libxkbcommon-dev
          libwlroots-dev libavcodec-dev libavutil-dev libswscale-dev
          libopus-dev libpipewire-0.3-dev
      - name: Configure
        run: cmake --preset tests-full
      - name: Build and test
        run: cmake --build --preset tests-full --parallel 2
